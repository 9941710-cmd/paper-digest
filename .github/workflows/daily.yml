name: Daily Paper Digest

on:
  schedule:
    - cron: "0 0 * * *"   # 毎日 09:00 JST
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------
      # Debug step (環境変数確認)
      # -----------------------------
      - name: Debug env presence
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
        run: |
          python - <<'PY'
          import os
          print("OPENAI_API_KEY:", "OPENAI_API_KEY" in os.environ)
          print("SMTP_PASSWORD:", "SMTP_PASSWORD" in os.environ)
          print("RECIPIENT_EMAIL:", "RECIPIENT_EMAIL" in os.environ)
          print("SENDER_EMAIL:", "SENDER_EMAIL" in os.environ)
          PY

      # -----------------------------
      # 論文収集エージェント実行
      # -----------------------------
      - name: Run agent
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          OPENALEX_EMAIL: ${{ secrets.OPENALEX_EMAIL }}
          SEMANTIC_SCHOLAR_API_KEY: ${{ secrets.SEMANTIC_SCHOLAR_API_KEY }}
        run: python main.py

      # -----------------------------
      # 送信履歴コミット
      # -----------------------------
      - name: Commit sent history
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add sent_db.json || echo "No file"
          git commit -m "Update sent history" || echo "No changes"
          git push
